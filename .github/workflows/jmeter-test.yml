name: JMeter Performance Test (Python)

on:
  push:
    branches: [main]

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Start Python server
      - name: Start server
        run: |
          python app/server.py &
          sleep 5

      # 4. Install JMeter
      - name: Install JMeter
        run: |
          sudo apt-get update
          sudo apt-get install -y jmeter

      # 5. Run JMeter test
      - name: Run JMeter
        run: |
          jmeter -n -t jmeter/test-plan.jmx -l results.jtl

      # 6. Show results
      - name: Show results
        run: cat results.jtl
